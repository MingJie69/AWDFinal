version: '3.8'

services:
  # 1. 数据库服务
  db:
    image: postgres:15
    container_name: awdfinal-db-1
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=elearningdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Jiejie87
    restart: always

  # 2. Redis 服务：实时聊天消息的中转站
  redis:
    image: redis:7-alpine
    container_name: awdfinal-redis-1
    restart: always

  # 3. Django Web 服务 (使用 Daphne 启动 ASGI)
  web:
    build: .
    container_name: awdfinal-web-1
    command: daphne -b 0.0.0.0 -p 8000 final.asgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - 8000
    environment:
      - DB_NAME=elearningdb
      - DB_USER=postgres
      - DB_PASSWORD=Jiejie87
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_DEBUG=False
      - SERVER_IP=165.245.176.218
      - DJANGO_SECRET_KEY=your-production-secret-key-here
    depends_on:
      - db
      - redis
    restart: always

  # 4. Nginx 服务：处理 HTTP、WebSocket 转发和静态文件
  nginx:
    image: nginx:latest
    container_name: awdfinal-nginx-1
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume: