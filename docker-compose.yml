version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=elearningdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Jiejie87

  web:
    build: .
    # 修改 1：将 gunicorn 替换为 daphne 以支持 ASGI/WebSocket
    # 修改 2：移除 command 里的 migrate 和 collectstatic，建议启动后手动执行一次更稳妥
    command: >
      sh -c "daphne -b 0.0.0.0 -p 8000 final.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - 8000
    environment:
      - DB_NAME=elearningdb
      - DB_USER=postgres
      - DB_PASSWORD=Jiejie87
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=False
      # 修改 3：确保环境变量名与 settings.py 匹配
      - SERVER_IP=165.245.176.218 
      - DJANGO_SECRET_KEY=your-secret-key-here
    depends_on:
      - db

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: